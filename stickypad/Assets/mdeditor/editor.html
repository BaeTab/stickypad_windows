<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src data:; font-src 'self'; base-uri 'none'; form-action 'none'; connect-src 'none';">
<style>
  html, body { height: 100%; margin: 0; }
  body { display: flex; flex-direction: column; background: transparent;
         font-family: 'Segoe UI','Malgun Gothic',sans-serif; }
  #toolbar { display: flex; flex-wrap: wrap; gap: 2px; align-items: center;
             padding: 4px 6px; flex: 0 0 auto;
             background: rgba(255,255,255,.55); border-bottom: 1px solid rgba(0,0,0,.10); }
  #toolbar button { min-width: 26px; height: 24px; padding: 0 6px;
                    border: none; border-radius: 4px; background: transparent;
                    color: #2a2a2a; font-size: 13px; cursor: pointer; line-height: 1;
                    font-family: inherit; }
  #toolbar button:hover { background: rgba(0,0,0,.10); }
  #toolbar .sep { width: 1px; height: 16px; background: rgba(0,0,0,.16); margin: 0 3px; }
  #editor { flex: 1 1 auto; min-height: 0; overflow: hidden; }
</style>
</head>
<body>
  <div id="toolbar">
    <button data-cmd="bold" title="굵게 (Ctrl+B)" style="font-weight:700">B</button>
    <button data-cmd="italic" title="기울임 (Ctrl+I)" style="font-style:italic">I</button>
    <button data-cmd="strike" title="취소선 (Ctrl+Shift+X)" style="text-decoration:line-through">S</button>
    <button data-cmd="code" title="인라인 코드 (Ctrl+`)">&lt;/&gt;</button>
    <span class="sep"></span>
    <button data-cmd="h1" title="제목 1 (Ctrl+Alt+1)">H1</button>
    <button data-cmd="h2" title="제목 2 (Ctrl+Alt+2)">H2</button>
    <span class="sep"></span>
    <button data-cmd="bullet" title="글머리표 목록">•</button>
    <button data-cmd="numbered" title="번호 목록">1.</button>
    <button data-cmd="task" title="체크박스 목록">☐</button>
    <button data-cmd="quote" title="인용">&#10077;</button>
    <span class="sep"></span>
    <button data-cmd="link" title="링크 (Ctrl+K)">🔗</button>
  </div>
  <div id="editor"></div>
  <div id="selftest" style="display:none"></div>
  <script src="mdeditor.bundle.js"></script>
</body>
</html>
