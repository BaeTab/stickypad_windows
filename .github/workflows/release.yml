name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained single-file exe
        shell: pwsh
        run: |
          dotnet publish stickypad/stickypad.csproj -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true -o publish
          Copy-Item publish/StickyPad.exe "StickyPad-${{ github.ref_name }}-win-x64.exe"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: StickyPad-*-win-x64.exe
          generate_release_notes: true
